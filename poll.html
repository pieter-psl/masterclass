<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>New Day · Live poll</title>

<!--
  ============================================================
  NEW DAY LIVE POLL  ·  PSL Consulting
  ============================================================
  EENMALIGE SETUP (ongeveer 10 minuten):
  1. Ga naar https://console.firebase.google.com en log in met Google.
  2. "Add project" -> naam bv. "newday-poll" -> Analytics mag uit -> Create.
  3. Links: Build -> Realtime Database -> Create Database ->
     locatie "europe-west1" -> start in TEST MODE -> Enable.
  4. Project Overview -> tandwiel -> Project settings -> onderaan
     "Your apps" -> klik het web-icoon (</>) -> app-naam -> Register app.
  5. Kopieer het hele firebaseConfig-blok dat je ziet.
  6. Plak het hieronder over het voorbeeld (tussen de >>> <<< regels).
  7. Sla op en upload dit bestand naar je eigen site.

  GEBRUIK OP DE AVOND:
  - Beamer:    open  jouwsite.nl/NewDay_live_poll.html?host
  - Telefoons: scan de QR op het scherm, of ga naar de site en typ de code.
  - Jij klikt "Volgende vraag", de zaal stemt, de balkjes lopen live mee.
  ============================================================
-->

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--navy:#1E293B;--navy2:#152540;--gold:#E2B77B;--soft:#F8FAFC;--ink:#334155;--gray:#64748B;--line:#E6E2DA;--track:#EAEEF3}
  body{font-family:'Inter',system-ui,Segoe UI,Arial,sans-serif;color:var(--ink);background:#EEF1F5;min-height:100vh}
  .wrap{max-width:560px;margin:0 auto;padding:18px 16px 40px}
  .card{background:var(--soft);border:1px solid var(--line);border-radius:20px;overflow:hidden}
  .top{background:var(--navy);padding:14px 22px;display:flex;justify-content:space-between;align-items:center}
  .eyebrow{color:var(--gold);font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase}
  .body{padding:26px 24px 30px}
  h1{font-family:Georgia,'Times New Roman',serif;color:var(--navy);font-size:26px;line-height:1.18;font-weight:700}
  .q{font-family:Georgia,serif;color:var(--navy);font-size:22px;line-height:1.25;font-weight:700;margin-bottom:20px}
  .lead{color:var(--gray);font-size:15px;line-height:1.55;margin:14px 0 22px}
  .label{color:var(--gold);font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;margin-bottom:11px}
  .opt{display:block;width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:15px 16px;margin-bottom:11px;font-size:16px;color:var(--navy);cursor:pointer;font-weight:500;transition:all .15s;min-height:52px}
  .opt:hover{border-color:var(--gold);background:#fffdf7}
  .opt:disabled{opacity:.55;cursor:default}
  .btn{display:inline-block;background:var(--navy);color:#fff;border:none;border-radius:12px;padding:14px 26px;font-size:15px;font-weight:600;cursor:pointer}
  .btn:hover{background:var(--navy2)}
  .btn.ghost{background:#fff;color:var(--navy);border:1.5px solid var(--line)}
  .btn .g{color:var(--gold)}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .inp{flex:1;min-width:160px;border:1.5px solid var(--line);border-radius:12px;padding:14px 16px;font-size:18px;letter-spacing:.12em;text-transform:uppercase;color:var(--navy);font-weight:700}
  .bar{margin-bottom:14px}
  .blab{display:flex;justify-content:space-between;font-size:15px;color:var(--navy);font-weight:600;margin-bottom:6px}
  .blab .n{color:var(--gray);font-weight:600}
  .btrack{height:26px;background:var(--track);border-radius:8px;overflow:hidden}
  .bfill{height:100%;background:var(--gold);width:0;border-radius:8px;transition:width .5s ease}
  .talk{background:#fff;border-left:4px solid var(--gold);border-radius:0 10px 10px 0;padding:13px 16px;margin-top:14px;color:var(--ink);font-size:14.5px;line-height:1.5}
  .foot{color:var(--gray);font-size:11.5px;text-align:center;margin-top:18px;letter-spacing:.04em}
  .note{color:var(--gray);font-size:13px;margin-top:14px;line-height:1.5}
  /* HOST (beamer) */
  body.host{background:var(--navy)}
  body.host .wrap{max-width:1100px;padding:26px 30px}
  body.host .card{background:var(--soft)}
  body.host .hosttop{display:flex;justify-content:space-between;align-items:center;gap:24px;background:var(--navy);border-radius:18px;padding:18px 26px;margin-bottom:18px}
  body.host .joincode{font-family:Georgia,serif;color:var(--gold);font-size:40px;font-weight:700;letter-spacing:.1em;line-height:1}
  body.host .joinurl{color:#C9D2DE;font-size:14px;margin-top:4px}
  body.host #qr{background:#F8FAFC;padding:8px;border-radius:10px;line-height:0}
  body.host .q{font-size:34px;margin-bottom:26px}
  body.host .btrack{height:42px}
  body.host .blab{font-size:21px}
  body.host .total{color:var(--gray);font-size:15px;font-weight:600;margin:6px 0 18px}
  body.host .talk{font-size:17px}
  body.host .ctrl{display:flex;gap:12px;margin-top:22px}
  .center{text-align:center}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
<div class="wrap"><div id="app"></div></div>

<script>
/* >>> PLAK HIER JE EIGEN FIREBASE-CONFIG (uit de Firebase console) <<< */
var firebaseConfig = {
  apiKey: "PLAK_HIER",
  authDomain: "PLAK_HIER.firebaseapp.com",
  databaseURL: "https://PLAK_HIER-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "PLAK_HIER",
  appId: "PLAK_HIER"
};
/* >>> tot hier <<< */

var QUESTIONS = [
 {q:"Hoe vaak gebruik je AI op je werk?", o:["Nog nooit echt","Af en toe","Elke week","Dagelijks"], talk:"Een mooie nulmeting. Waar zit de grootste groep, en wie staat aan de andere kant?"},
 {q:"Hoe voelt AI voor jou?", o:["Een beetje spannend","Nieuwsgierig","Enthousiast","Ik help anderen"], talk:"Van koudwatervrees naar aanjager. Vraag iemand uit elk kamp waarom."},
 {q:"Stelling: AI gaat een deel van mijn werk overnemen.", o:["Eens","Oneens"], talk:"Het saaie deel, ja. De vraag is wat je doet met de tijd die je terugkrijgt."},
 {q:"Stelling: ik durf AI mijn klantcommunicatie te laten schrijven.", o:["Eens","Oneens"], talk:"De eerste 80% wel, de laatste 20% (jouw toon en oordeel) blijf jij."},
 {q:"Stelling: over een jaar gebruikt iedereen in mijn vak AI.", o:["Eens","Oneens"], talk:"Loop jij voorop of volg je? Laat de 'oneens'-stemmers reageren."},
 {q:"Welke klus geef jij het liefst aan AI?", o:["De mails","De administratie","Content en social","Het uitzoekwerk"], talk:"Hier liggen de eerste quick wins, per bedrijf net even anders."}
];

var app=document.getElementById("app");
var params=new URLSearchParams(location.search);
var isHost=params.has("host");
var room=(params.get("room")||"").toUpperCase().replace(/[^A-Z0-9]/g,"");
var db=null;
try{ if(firebaseConfig.apiKey && firebaseConfig.apiKey!=="PLAK_HIER"){ firebase.initializeApp(firebaseConfig); db=firebase.database(); } }catch(e){}

var devId=null;
try{ devId=localStorage.getItem("pslDev"); if(!devId){ devId=Math.random().toString(36).slice(2,10); localStorage.setItem("pslDev",devId);} }catch(e){ devId=Math.random().toString(36).slice(2,10); }

function esc(s){return String(s).replace(/[&<>]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c]})}
function code4(){var a="ABCDEFGHJKLMNPQRSTUVWXYZ23456789",s="";for(var i=0;i<4;i++)s+=a[Math.floor(Math.random()*a.length)];return s}
function joinUrl(c){return location.origin+location.pathname+"?room="+c}

function barsHTML(opts,counts){
 var total=counts.reduce(function(a,b){return a+b},0);
 return opts.map(function(o,i){
   var c=counts[i]||0; var pct=total?Math.round(c/total*100):0;
   return '<div class="bar"><div class="blab"><span>'+esc(o)+'</span><span class="n">'+c+'  ('+pct+'%)</span></div><div class="btrack"><div class="bfill" style="width:'+pct+'%"></div></div></div>';
 }).join("");
}

function needConfig(){
 app.innerHTML='<div class="card"><div class="top"><span class="eyebrow">AI: Proosten op de toekomst</span></div><div class="body"><h1>Bijna klaar</h1><p class="lead">Plak eerst je Firebase-config bovenin dit bestand (zie de instructies in de code). Daarna werkt de live poll meteen.</p><div class="foot">PSL CONSULTING &middot; AI LEADERSHIP</div></div></div>';
}

/* ---------------- HOST (beamer) ---------------- */
function runHost(){
 document.body.classList.add("host");
 if(!room) room=params.get("room")?params.get("room").toUpperCase():code4();
 var curRef=db.ref("rooms/"+room+"/current");
 curRef.once("value").then(function(s){ if(s.val()===null) curRef.set(0); });
 var votesOff=null, curIdx=0;
 var url=joinUrl(room);
 curRef.on("value",function(s){
   curIdx=s.val()||0; render();
 });
 function render(){
   var Q=QUESTIONS[curIdx];
   app.innerHTML=''+
    '<div class="hosttop"><div><div class="eyebrow">AI: Proosten op de toekomst &middot; doe mee</div>'+
    '<div class="joincode">'+room+'</div><div class="joinurl">'+esc(url.replace(/^https?:\/\//,""))+'</div></div>'+
    '<div id="qr"></div></div>'+
    '<div class="card"><div class="body">'+
    '<div class="label">Vraag '+(curIdx+1)+' van '+QUESTIONS.length+'</div>'+
    '<div class="q">'+esc(Q.q)+'</div>'+
    '<div id="bars"></div><div class="total" id="total"></div>'+
    '<div class="talk"><b>Bespreek:</b> '+esc(Q.talk)+'</div>'+
    '<div class="ctrl"><button class="btn ghost" onclick="hPrev()">Vorige</button>'+
    '<button class="btn" onclick="hNext()">Volgende vraag <span class="g">&rarr;</span></button>'+
    '<button class="btn ghost" onclick="hReset()">Reset stemmen</button></div>'+
    '</div></div>';
   var qd=document.getElementById("qr"); qd.innerHTML="";
   if(window.QRCode){ try{ new QRCode(qd,{text:url,width:118,height:118,colorDark:"#1E293B",colorLight:"#F8FAFC"}); }catch(e){} }
   if(votesOff){ votesOff.off(); }
   votesOff=db.ref("rooms/"+room+"/votes/"+curIdx);
   votesOff.on("value",function(vs){
     var counts=Q.o.map(function(){return 0}); var total=0;
     vs.forEach(function(ch){ var v=ch.val(); if(typeof v==="number"&&counts[v]!==undefined){counts[v]++;total++;} });
     var b=document.getElementById("bars"); if(b) b.innerHTML=barsHTML(Q.o,counts);
     var t=document.getElementById("total"); if(t) t.textContent=total+(total===1?" stem":" stemmen");
   });
 }
 window.hNext=function(){ curRef.set(Math.min(curIdx+1,QUESTIONS.length-1)); };
 window.hPrev=function(){ curRef.set(Math.max(curIdx-1,0)); };
 window.hReset=function(){ if(confirm("Alle stemmen wissen en terug naar vraag 1?")){ db.ref("rooms/"+room+"/votes").remove(); curRef.set(0); } };
}

/* ---------------- PARTICIPANT (telefoon) ---------------- */
function runJoin(){
 if(!room){
   app.innerHTML='<div class="card"><div class="top"><span class="eyebrow">AI: Proosten op de toekomst</span></div><div class="body"><h1>Doe mee</h1><p class="lead">Typ de code van het scherm in en stem mee.</p><div class="row"><input id="cin" class="inp" maxlength="4" placeholder="CODE" autocapitalize="characters"><button class="btn" onclick="goRoom()">Meedoen <span class="g">&rarr;</span></button></div></div></div>';
   window.goRoom=function(){ var v=(document.getElementById("cin").value||"").toUpperCase().replace(/[^A-Z0-9]/g,""); if(v.length>=3){ location.search="?room="+v; } };
   return;
 }
 var curRef=db.ref("rooms/"+room+"/current");
 var voted={}, votesOff=null, curIdx=0;
 curRef.on("value",function(s){ curIdx=s.val()||0; render(); });
 function render(){
   var Q=QUESTIONS[curIdx];
   var has=(voted[curIdx]!==undefined);
   var head='<div class="top"><span class="eyebrow">AI: Proosten op de toekomst</span><span class="eyebrow">Code '+room+'</span></div>';
   if(!has){
     app.innerHTML='<div class="card">'+head+'<div class="body"><div class="label">Vraag '+(curIdx+1)+' van '+QUESTIONS.length+'</div><div class="q">'+esc(Q.q)+'</div>'+
       Q.o.map(function(o,i){return '<button class="opt" onclick="vote('+i+')">'+esc(o)+'</button>'}).join("")+
       '</div></div>';
   } else {
     app.innerHTML='<div class="card">'+head+'<div class="body"><div class="label">Je stem is binnen</div><div class="q">'+esc(Q.q)+'</div><div id="pb"></div><div class="note">Je koos: <b style="color:var(--navy)">'+esc(Q.o[voted[curIdx]])+'</b>. Wacht op de volgende vraag van het scherm.</div></div></div>';
     if(votesOff) votesOff.off();
     votesOff=db.ref("rooms/"+room+"/votes/"+curIdx);
     votesOff.on("value",function(vs){ var counts=Q.o.map(function(){return 0}); vs.forEach(function(ch){var v=ch.val(); if(typeof v==="number"&&counts[v]!==undefined)counts[v]++;}); var pb=document.getElementById("pb"); if(pb) pb.innerHTML=barsHTML(Q.o,counts); });
   }
 }
 window.vote=function(i){ voted[curIdx]=i; db.ref("rooms/"+room+"/votes/"+curIdx+"/"+devId).set(i); render(); };
}

if(!db){ needConfig(); }
else if(isHost){ runHost(); }
else { runJoin(); }
</script>
</body>
</html>
